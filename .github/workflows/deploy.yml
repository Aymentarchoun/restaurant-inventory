name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create PHP DB config from secrets
        run: |
          printf '<?php\ndefine("DB_HOST", "%s");\ndefine("DB_NAME", "%s");\ndefine("DB_USER", "%s");\ndefine("DB_PASS", "%s");\n' \
            "${{ secrets.DB_HOST }}" \
            "${{ secrets.DB_NAME }}" \
            "${{ secrets.DB_USER }}" \
            "${{ secrets.DB_PASS }}" \
            > public/api/config.php

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 145.79.14.111
          username: u427121666
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./dist/
          server-dir: /domains/chef-alfreej.com/public_html/store/
          dangerous-clean-slate: false

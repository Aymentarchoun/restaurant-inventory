name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create PHP DB config from secrets
        run: |
          printf '<?php\ndefine("DB_HOST", "%s");\ndefine("DB_NAME", "%s");\ndefine("DB_USER", "%s");\ndefine("DB_PASS", "%s");\n' \
            "${{ secrets.DB_HOST }}" \
            "${{ secrets.DB_NAME }}" \
            "${{ secrets.DB_USER }}" \
            "${{ secrets.DB_PASS }}" \
            > public/api/config.php

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Deploy dist to hostinger-deploy branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd dist
          git init
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --force \
            "https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:hostinger-deploy
